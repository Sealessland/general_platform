name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workspace:
    name: Workspace Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate workspace
        run: bash ci/scripts/validate-workspace.sh
      - name: Check OpenAPI
        run: bash ci/scripts/check-openapi.sh

  security:
    uses: ./.github/workflows/security-test.yml

  backend:
    uses: ./.github/workflows/backend-test.yml

  frontend:
    uses: ./.github/workflows/frontend-test.yml

  ai-service:
    uses: ./.github/workflows/ai-service-test.yml

  docker:
    uses: ./.github/workflows/docker-build.yml
