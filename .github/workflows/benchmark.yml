name: Benchmark

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: redcart_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -h 127.0.0.1 -U postgres -d redcart_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:4-alpine
        env:
          RABBITMQ_DEFAULT_USER: postgres
          RABBITMQ_DEFAULT_PASS: postgres
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Run benchmarks
        working-directory: backend
        env:
          POSTGRES_DSN: postgres://postgres:postgres@127.0.0.1:5432/redcart_test?sslmode=disable
          REDIS_ADDR: 127.0.0.1:6379
          RABBITMQ_ADDR: amqp://postgres:postgres@127.0.0.1:5672/
          RABBITMQ_EXCHANGE: redcart.events.bench
          RUN_POSTGRES_INTEGRATION: "1"
        run: |
          go test ./internal/redcart/interfaces/httpapi ./internal/event/outbox ./internal/event/rabbitmq \
            -run '^$' \
            -bench 'BenchmarkHTTPNotes|BenchmarkHTTPOrderPreview|BenchmarkHTTPPostgresOrderPreview|BenchmarkHTTPPostgresCreateOrder|BenchmarkHTTPPostgresCreateOrderWithOutbox|BenchmarkOutbox|BenchmarkRabbitMQPublish' \
            -benchtime=1s \
            -benchmem \
            -count=1 \
            | tee benchmark.txt

      - name: Update README with benchmark results
        run: python3 ci/scripts/update-benchmark-readme.py < backend/benchmark.txt

      - name: Commit benchmark results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update benchmark results [skip ci]"
          file_pattern: README.md
          branch: main
