name: Backend Test

on:
  workflow_call:
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-test.yml"
  push:
    branches: [main]
    paths:
      - "backend/**"

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: redcart_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -h 127.0.0.1 -U postgres -d redcart_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Download dependencies
        working-directory: backend
        run: go mod download
      - name: Run tests
        working-directory: backend
        env:
          POSTGRES_DSN: postgres://postgres:postgres@127.0.0.1:5432/redcart_test?sslmode=disable
        run: go test ./... -coverprofile=coverage.out
      - name: Build backend
        working-directory: backend
        run: go build ./cmd/api
