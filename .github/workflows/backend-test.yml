name: Backend Test

on:
  workflow_call:
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: redcart_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -h 127.0.0.1 -U postgres -d redcart_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Backend CI
        env:
          POSTGRES_DSN: postgres://postgres:postgres@127.0.0.1:5432/redcart_test?sslmode=disable
          REDIS_ADDR: 127.0.0.1:6379
          RUN_POSTGRES_INTEGRATION: "1"
        run: bash ci/scripts/backend-ci.sh
      - name: Upload backend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-ci-artifacts
          path: |
            backend/coverage.out
            ci/artifacts/backend-test.txt
            ci/artifacts/backend-test-list.txt
            ci/artifacts/backend-coverage-functions.txt
            ci/artifacts/backend-coverage-summary.txt
            ci/artifacts/backend-test-metrics.json
            ci/artifacts/backend-postgres-integration.txt
            ci/artifacts/backend-postgres-http-integration.txt
            ci/artifacts/backend-benchmark.txt
            ci/artifacts/backend-qps.txt
            ci/artifacts/backend-postgres-http-benchmark.txt
            ci/artifacts/backend-postgres-http-qps.txt
