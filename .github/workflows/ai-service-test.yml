name: AI Service Test

on:
  workflow_call:
  workflow_dispatch:

jobs:
  ai-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: AI Service CI
        run: bash ci/scripts/ai-service-ci.sh
