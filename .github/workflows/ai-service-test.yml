name: AI Service Test

on:
  workflow_call:
  pull_request:
    branches: [main]
    paths:
      - "ai-service/**"
      - ".github/workflows/ai-service-test.yml"
  push:
    branches: [main]
    paths:
      - "ai-service/**"

jobs:
  ai-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run tests
        working-directory: ai-service
        run: python -m unittest discover -s tests
      - name: Check prompts
        working-directory: ai-service
        run: python app/check_prompts.py
