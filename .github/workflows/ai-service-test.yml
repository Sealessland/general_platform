name: AI Service Test

on:
  workflow_call:
  pull_request:
    branches: [main]
    paths:
      - "ai-service/**"
      - ".github/workflows/ai-service-test.yml"
  push:
    branches: [main]
    paths:
      - "ai-service/**"

jobs:
  ai-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: AI Service CI
        run: bash ci/scripts/ai-service-ci.sh
