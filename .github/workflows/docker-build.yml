name: Docker Build

on:
  workflow_call:
  workflow_dispatch:

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build backend image
        run: docker build -t redcart-backend:ci backend
      - name: Build frontend image
        run: docker build -t redcart-frontend:ci frontend
      - name: Build ai-service image
        run: docker build -t redcart-ai-service:ci ai-service
