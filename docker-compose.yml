services:
  postgres:
    image: postgres:16
    network_mode: host
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: redcart
    command: ["postgres", "-p", "15432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 15432 -U postgres -d redcart"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    network_mode: host
    command: ["redis-server", "--port", "6380", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6380", "PING"]
      interval: 10s
      timeout: 5s
      retries: 5

  pyroscope:
    image: grafana/pyroscope:latest
    network_mode: host

  ai-service:
    build:
      context: ./ai-service
    network_mode: host
    environment:
      AI_GRPC_HOST: 0.0.0.0
      AI_GRPC_PORT: 50051
    expose:
      - "50051"
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import grpc; ch=grpc.insecure_channel('127.0.0.1:50051'); grpc.channel_ready_future(ch).result(timeout=3)"
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management-alpine
    network_mode: host
    environment:
      RABBITMQ_DEFAULT_USER: redcart
      RABBITMQ_DEFAULT_PASS: redcart
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    network_mode: host
    environment:
      HTTP_PORT: 18080
      POSTGRES_DSN: postgres://postgres:postgres@127.0.0.1:15432/redcart?sslmode=disable
      REDIS_ADDR: 127.0.0.1:6380
      AI_PROVIDER: grpc
      AI_GRPC_ADDR: 127.0.0.1:50051
      RABBITMQ_ADDR: amqp://redcart:redcart@127.0.0.1:5672/
      RABBITMQ_EXCHANGE: redcart.events
      PYROSCOPE_SERVER_ADDRESS: ${PYROSCOPE_SERVER_ADDRESS-http://127.0.0.1:4040}
      PYROSCOPE_APPLICATION_NAME: ${PYROSCOPE_APPLICATION_NAME-redcart.backend}
      PYROSCOPE_BASIC_AUTH_USER: ${PYROSCOPE_BASIC_AUTH_USER:-}
      PYROSCOPE_BASIC_AUTH_PASSWORD: ${PYROSCOPE_BASIC_AUTH_PASSWORD:-}
      PYROSCOPE_TENANT_ID: ${PYROSCOPE_TENANT_ID:-}
      PYROSCOPE_MUTEX_PROFILE_FRACTION: ${PYROSCOPE_MUTEX_PROFILE_FRACTION:-}
      PYROSCOPE_BLOCK_PROFILE_RATE: ${PYROSCOPE_BLOCK_PROFILE_RATE:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      pyroscope:
        condition: service_started
      ai-service:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    network_mode: host
    depends_on:
      - backend
